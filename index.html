<!doctype html>
<html lang="zh-CN">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0b5ed7" />
    <title>加班与调休管理器 - 移动版</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="stylesheet" href="./style.css" />
</head>

<body>
    <div class="bg-blur bg1"></div>
    <div class="bg-blur bg2"></div>

    <header class="topbar">
        <div class="brand">OT</div>
        <div>
            <h1>加班与调休管理器</h1>
            <p id="todayText">今天</p>
        </div>
    </header>

    <main class="wrap">
        <section class="card">
            <h2>加班登记</h2>
            <div class="grid2">
                <label>开始加班时间
                    <input id="otStart" type="datetime-local" />
                </label>
                <label>结束加班时间
                    <input id="otEnd" type="datetime-local" />
                </label>
            </div>
            <button id="addOtBtn" class="btn primary">新增加班记录</button>
            <p class="hint">规则：工作日18:30后、周六13:00后、周日按打卡；按0.5小时向下取整。</p>
        </section>

        <section class="card">
            <h2>调休登记</h2>
            <div class="grid2">
                <label>开始调休时间
                    <input id="lvStart" type="datetime-local" />
                </label>
                <label>结束调休时间
                    <input id="lvEnd" type="datetime-local" />
                </label>
            </div>
            <button id="addLvBtn" class="btn accent">新增调休记录</button>
            <p class="hint">规则：工作日8:30-17:30扣11:30-13:00；周六仅8:30-11:30；周日/节假日不计入。支持跨日期自动分段。</p>
        </section>

        <section class="stats">
            <article>
                <b id="sOt">0.00</b><span>小时</span><small>当前加班时长</small>
            </article>
            <article>
                <b id="sLv">0.00</b><span>小时</span><small>已调休时长</small>
            </article>
            <article>
                <b id="sRem">0.00</b><span>小时</span><small>剩余休时长</small>
            </article>
            <article>
                <b id="sDays">0.00</b><span>天(7.5h/天)</span><small>剩余休时长</small>
            </article>
        </section>

        <section class="card actions">
            <button id="exportBtn" class="btn primary ghost">导出JSON</button>
            <label class="btn ghost" for="importInput">导入JSON</label>
            <input id="importInput" type="file" accept="application/json" hidden />
            <button id="resetBtn" class="btn danger ghost">重置全部</button>
        </section>

        <section class="card">
            <div class="list-head">
                <h3>加班记录</h3>
                <button id="delOtBtn" class="btn danger">删除选中</button>
            </div>
            <div id="otList" class="list"></div>
        </section>

        <section class="card">
            <div class="list-head">
                <h3>调休记录</h3>
                <button id="delLvBtn" class="btn danger">删除选中</button>
            </div>
            <div id="lvList" class="list"></div>
        </section>
    </main>

    <template id="rowTpl">
        <label class="row">
            <input type="checkbox" class="pick" />
            <div>
                <p class="line1"></p>
                <p class="line2"></p>
            </div>
            <div class="right">
                <b class="hours"></b>
                <small class="rule"></small>
            </div>
        </label>
    </template>

    <script src="./app_mobile.js"></script>
</body>

</html>
